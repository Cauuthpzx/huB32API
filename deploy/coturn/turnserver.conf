# HUB32 coturn TURN server configuration
# Documentation: https://github.com/coturn/coturn/wiki/turnserver

# Listening ports
listening-port=3478
tls-listening-port=443

# Network
listening-ip=0.0.0.0
# external-ip=YOUR_VPS_PUBLIC_IP

# Relay ports for WebRTC media
min-port=40000
max-port=49999

# Authentication (TURN REST API — compatible with hub32api HMAC generation)
use-auth-secret
# static-auth-secret=GENERATE_WITH: openssl rand -hex 32
realm=hub32

# TLS certificates (Let's Encrypt)
# cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
# pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem

# Security hardening
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
no-tcp-relay
no-rfc5780

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log

# Performance
proc-quota-limit=60
total-quota=300
max-bps=3000000
